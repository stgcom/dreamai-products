<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream AI Assistant</title>
<style>
/* ============================================================
   DREAM AI CHATBOT WIDGET
   Self-contained HTML/CSS/JS chatbot with OpenAI integration.
   
   CONFIGURATION:
   - Set OPENAI_API_KEY below or via window.DREAM_AI_CONFIG
   - Set CUSTOM_SYSTEM_PROMPT to customize AI behavior
   - Adjust API_ENDPOINT if using a proxy
   ============================================================ */

:root {
  --dream-violet: #6C3CE9;
  --dream-violet-dark: #5A2ED4;
  --dream-violet-light: #8B5CF6;
  --dream-violet-glow: rgba(108, 60, 233, 0.3);
  --bg-primary: #0F0F14;
  --bg-secondary: #1A1A24;
  --bg-tertiary: #24243A;
  --bg-chat-panel: #13131D;
  --bg-user-msg: #6C3CE9;
  --bg-ai-msg: #1E1E2E;
  --text-primary: #F0F0F5;
  --text-secondary: #9999B0;
  --text-muted: #666680;
  --border-color: #2A2A3E;
  --online-green: #22C55E;
  --error-red: #EF4444;
  --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 30px rgba(108, 60, 233, 0.2);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Reset */
#dream-chatbot * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

#dream-chatbot {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999999;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── CHAT BUBBLE ─── */
.dream-bubble {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--dream-violet), var(--dream-violet-dark));
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  transition: transform var(--transition-bounce), box-shadow var(--transition-fast);
  position: relative;
  outline: none;
}

.dream-bubble:hover {
  transform: scale(1.08);
  box-shadow: var(--shadow-lg), 0 0 40px rgba(108, 60, 233, 0.4);
}

.dream-bubble:active {
  transform: scale(0.95);
}

.dream-bubble svg {
  width: 28px;
  height: 28px;
  fill: white;
  transition: transform var(--transition-fast);
}

.dream-bubble:hover svg {
  transform: rotate(-8deg) scale(1.05);
}

/* Notification badge */
.dream-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  width: 22px;
  height: 22px;
  background: var(--error-red);
  color: white;
  font-size: 11px;
  font-weight: 700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg-primary);
  opacity: 0;
  transform: scale(0);
  transition: all var(--transition-bounce);
}

.dream-badge.visible {
  opacity: 1;
  transform: scale(1);
}

/* Pulse ring */
.dream-bubble::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--dream-violet);
  opacity: 0;
  animation: none;
}

.dream-bubble.pulse::before {
  animation: pulseRing 2s ease-out infinite;
}

@keyframes pulseRing {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* ─── CHAT PANEL ─── */
.dream-panel {
  position: absolute;
  bottom: 76px;
  right: 0;
  width: 380px;
  height: 520px;
  max-height: calc(100vh - 120px);
  background: var(--bg-chat-panel);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--border-color);
  opacity: 0;
  transform: translateY(20px) scale(0.95);
  pointer-events: none;
  transition: opacity var(--transition-smooth), transform var(--transition-smooth);
}

.dream-panel.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}

/* ─── PANEL HEADER ─── */
.dream-header {
  background: linear-gradient(135deg, var(--dream-violet-dark), #3B1FA0);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.dream-header::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
  border-radius: 50%;
}

.dream-header-avatar {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  backdrop-filter: blur(10px);
}

.dream-header-avatar svg {
  width: 22px;
  height: 22px;
  fill: white;
}

.dream-header-info {
  flex: 1;
  min-width: 0;
}

.dream-header-title {
  color: white;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.dream-header-status {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
}

.dream-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--online-green);
  flex-shrink: 0;
  position: relative;
}

.dream-status-dot::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: rgba(34, 197, 94, 0.3);
  animation: statusPulse 2s ease-in-out infinite;
}

@keyframes statusPulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.5); opacity: 0; }
}

.dream-status-text {
  color: rgba(255, 255, 255, 0.8);
  font-size: 12px;
}

.dream-header-actions {
  display: flex;
  gap: 4px;
  z-index: 1;
}

.dream-header-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition-fast);
  color: white;
  outline: none;
}

.dream-header-btn:hover {
  background: rgba(255, 255, 255, 0.2);
}

.dream-header-btn svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
}

/* ─── MESSAGES AREA ─── */
.dream-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  background: var(--bg-chat-panel);
}

.dream-messages::-webkit-scrollbar {
  width: 4px;
}

.dream-messages::-webkit-scrollbar-track {
  background: transparent;
}

.dream-messages::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: var(--radius-full);
}

/* Message bubbles */
.dream-msg {
  display: flex;
  gap: 8px;
  max-width: 85%;
  animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.dream-msg.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.dream-msg.ai {
  align-self: flex-start;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.dream-msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.dream-msg.user .dream-msg-avatar {
  display: none;
}

.dream-msg-avatar svg {
  width: 16px;
  height: 16px;
  fill: var(--dream-violet-light);
}

.dream-msg-bubble {
  padding: 10px 14px;
  border-radius: var(--radius-md);
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
}

.dream-msg.ai .dream-msg-bubble {
  background: var(--bg-ai-msg);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}

.dream-msg.user .dream-msg-bubble {
  background: var(--dream-violet);
  color: white;
  border-bottom-right-radius: 4px;
}

.dream-msg-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  padding: 0 2px;
}

.dream-msg.user .dream-msg-time {
  text-align: right;
}

/* Quick reply buttons */
.dream-quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.dream-quick-reply {
  padding: 6px 14px;
  border: 1px solid var(--dream-violet);
  background: rgba(108, 60, 233, 0.1);
  color: var(--dream-violet-light);
  border-radius: var(--radius-full);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition-fast);
  outline: none;
  font-family: inherit;
}

.dream-quick-reply:hover {
  background: var(--dream-violet);
  color: white;
  transform: translateY(-1px);
}

/* Typing indicator */
.dream-typing {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}

.dream-typing.visible {
  display: flex;
}

.dream-typing-dots {
  display: flex;
  gap: 4px;
  padding: 10px 14px;
  background: var(--bg-ai-msg);
  border-radius: var(--radius-md);
  border-bottom-left-radius: 4px;
}

.dream-typing-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typingBounce 1.4s ease-in-out infinite;
}

.dream-typing-dot:nth-child(2) { animation-delay: 0.15s; }
.dream-typing-dot:nth-child(3) { animation-delay: 0.3s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ─── INPUT AREA ─── */
.dream-input-area {
  padding: 12px 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}

.dream-input-wrapper {
  flex: 1;
  position: relative;
}

.dream-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  transition: border-color var(--transition-fast);
  line-height: 1.4;
}

.dream-input::placeholder {
  color: var(--text-muted);
}

.dream-input:focus {
  border-color: var(--dream-violet);
  box-shadow: 0 0 0 3px rgba(108, 60, 233, 0.15);
}

.dream-send-btn {
  width: 42px;
  height: 42px;
  border: none;
  background: var(--dream-violet);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  flex-shrink: 0;
  outline: none;
}

.dream-send-btn:hover:not(:disabled) {
  background: var(--dream-violet-dark);
  transform: translateY(-1px);
}

.dream-send-btn:active:not(:disabled) {
  transform: translateY(0) scale(0.95);
}

.dream-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.dream-send-btn svg {
  width: 18px;
  height: 18px;
  fill: white;
  transform: rotate(-45deg) translateX(1px);
}

/* ─── POWERED BY ─── */
.dream-powered {
  text-align: center;
  padding: 6px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
}

.dream-powered a {
  color: var(--dream-violet-light);
  text-decoration: none;
}

.dream-powered a:hover {
  text-decoration: underline;
}

/* ─── MOBILE RESPONSIVE ─── */
@media (max-width: 480px) {
  #dream-chatbot {
    bottom: 16px;
    right: 16px;
  }

  .dream-panel {
    position: fixed;
    bottom: 0;
    right: 0;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    max-height: 100vh;
    border-radius: 0;
    transform: translateY(100%) scale(1);
  }

  .dream-panel.open {
    transform: translateY(0) scale(1);
  }

  .dream-bubble {
    width: 54px;
    height: 54px;
  }

  .dream-header {
    padding: 14px 16px;
  }

  .dream-messages {
    padding: 12px;
  }
}

/* ─── LINKS IN MESSAGES ─── */
.dream-msg-bubble a {
  color: var(--dream-violet-light);
  text-decoration: none;
}

.dream-msg-bubble a:hover {
  text-decoration: underline;
}

/* ─── ERROR STATE ─── */
.dream-error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
  color: var(--error-red);
  margin: 4px 0;
}

/* ─── WELCOME MESSAGE ─── */
.dream-welcome {
  text-align: center;
  padding: 20px 16px;
  color: var(--text-secondary);
}

.dream-welcome h3 {
  font-size: 16px;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.dream-welcome p {
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 14px;
}

/* ─── SOUND TOGGLE ─── */
.dream-sound-on { color: white; }
.dream-sound-off { color: var(--text-muted); }
</style>
</head>

     DREAM AI CHATBOT WIDGET
     Insert this single file (or script tag) into any page.
     
     CONFIGURATION — Set before loading this script:
       window.DREAM_AI_CONFIG = {

         brandName: 'Dream AI',            // Brand name override

       };
     ============================================================ -->

<div id="dream-chatbot"></div>

<audio id="dream-chat-sound" preload="auto">
  <!-- Minimal notification beep as base64 data URI -->
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<script>
(function() {
  'use strict';

  // ================================================================
  // CONFIGURATION
  // ================================================================
  // Override any of these by setting window.DREAM_AI_CONFIG before this script loads.
  // Example:
  //   window.DREAM_AI_CONFIG = {
  //     openaiApiKey: 'sk-proj-abc123...',
  //     model: 'gpt-4o-mini',
  //     calculatorUrl: 'https://dream-ai.com/calculator',
  //     demoCalendlyUrl: 'https://calendly.com/dream-ai/demo',
  //   };
  // ================================================================

  const CONFIG = Object.assign({
    // ── OpenAI API ──
    // IMPORTANT: In production, NEVER expose your API key in client-side code.
    // Use a backend proxy server that forwards requests to OpenAI.
    // Set this to your backend proxy endpoint instead.
    // Example: 'https://api.dream-ai.com/chat' (your own server)
    openaiApiKey: '',                          // <-- SET YOUR KEY HERE or via DREAM_AI_CONFIG
    apiEndpoint: 'https://api.openai.com/v1/chat/completions',
    model: 'gpt-4o-mini',

    // ── System Prompt ──
    systemPrompt: `You are the Dream AI Assistant, a friendly and knowledgeable AI representative for Dream AI.
Dream AI is an AI employee platform for small businesses that handles calls, messages, and bookings 24/7.

KEY INFORMATION:
- Dream AI is an AI employee platform for small businesses
- It handles calls, messages, and bookings 24/7 automatically
- It helps businesses never miss a lead or customer inquiry
- Works as an AI receptionist, AI customer service rep, and AI sales assistant

PRICING TIERS:
- Starter Kit: $297 (one-time) — DIY setup with templates and training
- Managed Service: $497/month — We build, launch, and manage everything for you
- Custom Solution: $1,497+ — Fully custom AI employee tailored to your business

INDUSTRIES SERVED:
- Real Estate (appointment setting, lead qualification, showing scheduling)
- MedSpa (consultation booking, follow-ups, treatment reminders)
- HVAC (service scheduling, emergency dispatch, follow-up)
- Restaurants, Salons, Fitness, Legal, and more

HOW IT WORKS:
1. We learn your business, processes, and voice
2. We build your custom AI employee
3. It handles calls, texts, and messages
4. You focus on serving customers while AI handles the front desk

ALWAYS:
- Be warm, helpful, and professional
- Use short, conversational messages (2-3 sentences max)
- Ask qualifying questions naturally
- Offer to collect email for more information after 2-3 messages
- If someone asks for a demo, offer to book one and collect their email
- If someone asks about pricing, mention all three tiers
- If someone asks about revenue/missed calls, mention the calculator
- Use emoji sparingly (1 per message max)

NEVER:
- Make up features or pricing not listed above
- Be pushy or salesy
- Write long paragraphs — keep it conversational`,
    calculatorUrl: 'https://dream-ai.com/calculator',
    demoCalendlyUrl: 'https://calendly.com/dream-ai/demo',
    brandName: 'Dream AI',
    soundEnabled: true,
    maxMessagesBeforeEmailAsk: 3,
  }, window.DREAM_AI_CONFIG || {});

  // ================================================================
  // STATE
  // ================================================================
  const state = {
    isOpen: false,
    messages: [],
    messageCount: 0,
    emailCollected: false,
    email: null,
    isTyping: false,
    soundEnabled: CONFIG.soundEnabled,
    conversationPhase: 'initial', // initial → asking_email → asked_calculator → done
    requestedDemo: false,
  };

  // ================================================================
  // PRE-PROGRAMMED RESPONSES (fallback when no OpenAI key or as first match)
  // ================================================================
  const PRE_RESPONSES = [
    {
      keywords: ['what is dream ai', 'what does dream ai', 'tell me about dream ai', 'what do you do', 'what are you'],
      response: `Dream AI is an AI employee platform for small businesses. We deploy AI assistants that handle your calls, messages, and bookings 24/7 — so you never miss a lead again. 🤖\n\nThink of it as a smart receptionist, customer service rep, and sales assistant that never sleeps. Want me to tell you more about how it works?`
    },
    {
      keywords: ['price', 'cost', 'how much', 'pricing', 'plan', 'plans', 'fee', 'afford'],
      response: `Great question! Here are our plans:\n\n🥉 **Starter Kit** — $297 one-time\nDIY setup with all templates and training\n\n🥈 **Managed Service** — $497/mo\nWe build, launch, and manage everything for you\n\n🥇 **Custom Solution** — $1,497+\nFully custom AI employee tailored to your business\n\nMost businesses start with Managed. Want me to show you which fits best?`
    },
    {
      keywords: ['industry', 'industries', 'work with', 'serve', 'type of business', 'business type'],
      response: `We work across many industries! Here are our top ones:\n\n🏠 **Real Estate** — Lead qualification, showing scheduling\n💆 **MedSpa** — Consultation booking, follow-ups\n🔧 **HVAC** — Service scheduling, emergency dispatch\n\nWe also serve restaurants, salons, fitness studios, law firms, and more.\n\nWhat industry are you in? I can tell you exactly how we'd help!`
    },
    {
      keywords: ['demo', 'see it', 'show me', 'try it', 'example', 'live demo', 'book'],
      response: `Absolutely! I can book a free demo for you right now. 📅\n\nJust drop your email below and I'll send you a booking link. The demo takes about 20 minutes and we'll show you exactly how an AI employee works for your business.`
    },
    {
      keywords: ['how does it work', 'how it works', 'how do you', 'process', 'setup'],
      response: `It's simple — 3 steps:\n\n1️⃣ **We learn** your business, processes, and communication style\n2️⃣ **We build** your custom AI employee\n3️⃣ **You relax** while AI handles calls, texts, and bookings 24/7\n\nWant to see how much revenue you might be losing to missed calls? Check our [Revenue Calculator](${CONFIG.calculatorUrl}) — it's free!`
    },
    {
      keywords: ['revenue', 'lost', 'miss', 'missed calls', 'calculator', 'calc'],
      response: `Smart move! Most small businesses lose $5,000-$50,000+/year to missed calls and messages.\n\nOur [Revenue Calculator](${CONFIG.calculatorUrl}) shows you exactly how much you're leaving on the table — takes 60 seconds.\n\nWant me to send you the link?`
    },
    {
      keywords: ['hello', 'hi', 'hey', 'sup', 'morning', 'afternoon', 'evening'],
      response: `Hey there! 👋 Welcome to Dream AI. I'm your AI assistant — I can answer questions about our AI employee platform, pricing, and how we help businesses never miss a lead.\n\nWhat brings you here today?`
    },
    {
      keywords: ['thank', 'thanks', 'appreciate'],
      response: `You're welcome! Happy to help. 😊 Is there anything else about Dream AI you'd like to know?`
    },
    {
      keywords: ['bye', 'goodbye', 'later', 'talk later'],
      response: `Bye for now! 👋 Remember — Dream AI never sleeps, so feel free to come back anytime.\n\nDon't forget: you can book a free demo whenever you're ready!`
    },
  ];

  // ================================================================
  // UTILITIES
  // ================================================================
  function getTimestamp() {
    const now = new Date();
    return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatMessage(text) {
    // Simple markdown-lite: bold, links, newlines
    let html = escapeHtml(text);
    // Bold
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Newlines
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function playSound() {
    if (!state.soundEnabled) return;
    try {
      const audio = document.getElementById('dream-chat-sound');
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(() => {}); // Ignore autoplay policy errors
      }
    } catch (e) {}
  }

  function isEmail(str) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str.trim());
  }

  function matchPreResponse(input) {
    const lower = input.toLowerCase().trim();
    for (const item of PRE_RESPONSES) {
      if (item.keywords.some(kw => lower.includes(kw))) {
        return item.response;
      }
    }
    return null;
  }

  // ================================================================
  // OPENAI API
  // ================================================================
  async function getAIResponse(userMessage) {
    // If no API key, use pre-programmed responses only
    if (!CONFIG.openaiApiKey) {
      return matchPreResponse(userMessage) || generateFallbackResponse(userMessage);
    }

    try {
      const messages = [
        { role: 'system', content: CONFIG.systemPrompt },
        ...state.messages
          .filter(m => m.role !== 'system')
          .map(m => ({ role: m.role, content: m.content })),
        { role: 'user', content: userMessage }
      ];

      const response = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${CONFIG.openaiApiKey}`,
        },
        body: JSON.stringify({
          model: CONFIG.model,
          messages: messages,
          max_tokens: 300,
          temperature: 0.7,
        }),
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        console.error('[Dream AI Chat] API Error:', errorData);
        // Fall back to pre-programmed
        return matchPreResponse(userMessage) || generateFallbackResponse(userMessage);
      }

      const data = await response.json();
      return data.choices?.[0]?.message?.content || generateFallbackResponse(userMessage);
    } catch (error) {
      console.error('[Dream AI Chat] Network error:', error);
      return matchPreResponse(userMessage) || generateFallbackResponse(userMessage);
    }
  }

  function generateFallbackResponse(input) {
    const lower = input.toLowerCase();
    if (isEmail(input)) {
      return handleEmailInput(input);
    }
    return `Thanks for your message! I'm here to help with questions about Dream AI — our AI employee platform for small businesses. 😊\n\nYou can ask me about:\n• What Dream AI is\n• Pricing plans\n• Industries we serve\n• How to book a demo\n• Revenue calculator`;
  }

  // ================================================================
  // LEAD CAPTURE FLOW
  // ================================================================
  function handleEmailInput(input) {
    const email = input.trim();
    state.email = email;
    state.emailCollected = true;

    if (state.requestedDemo) {
      return `Perfect! I've got your email: **${email}**\n\n📅 Here's your demo booking link: [Book Your Free Demo](${CONFIG.demoCalendlyUrl})\n\nJust pick a time that works and we'll walk you through everything. See you there! 🎉`;
    }

    return `Got it — **${email}** is saved! 📧\n\nHere's something valuable: Want me to calculate how much revenue your business might be losing to missed calls? It takes 60 seconds.\n\n[Try the Revenue Calculator →](${CONFIG.calculatorUrl})`;
  }

  function checkLeadCapture(text) {
    // After 3 messages, ask for email
    if (state.messageCount >= CONFIG.maxMessagesBeforeEmailAsk &&
        !state.emailCollected &&
        state.conversationPhase === 'initial') {
      state.conversationPhase = 'asking_email';

      setTimeout(() => {
        addMessage('ai', `Quick question — can I grab your email? I'll send you a personalized breakdown of how Dream AI could work for your business. 📧`);
      }, 1000);
    }
  }

  // ================================================================
  // UI RENDERING
  // ================================================================
  function createDOM() {
    const container = document.getElementById('dream-chatbot');
    container.innerHTML = `
      <!-- Chat Bubble -->
      <button class="dream-bubble pulse" id="dream-bubble" aria-label="Open Dream AI Chat" title="Chat with Dream AI">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
        <span class="dream-badge" id="dream-badge">1</span>
      </button>

      <!-- Chat Panel -->
      <div class="dream-panel" id="dream-panel">
        <!-- Header -->
        <div class="dream-header">
          <div class="dream-header-avatar">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          </div>
          <div class="dream-header-info">
            <div class="dream-header-title">${escapeHtml(CONFIG.brandName)} Assistant</div>
            <div class="dream-header-status">
              <div class="dream-status-dot"></div>
              <span class="dream-status-text">Online — typically replies instantly</span>
            </div>
          </div>
          <div class="dream-header-actions">
            <button class="dream-header-btn" id="dream-sound-toggle" title="Toggle sound">
              <svg class="dream-sound-on" id="dream-sound-icon" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
              </svg>
            </button>
            <button class="dream-header-btn" id="dream-minimize" title="Minimize">
              <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
            </button>
          </div>
        </div>

        <!-- Messages -->
        <div class="dream-messages" id="dream-messages">
          <div class="dream-welcome">
            <h3>👋 Hi! I'm the Dream AI Assistant</h3>
            <p>I can answer questions about our AI employee platform, help you find the right plan, or book a free demo.</p>
          </div>
        </div>

        <!-- Input -->
        <div class="dream-input-area">
          <div class="dream-input-wrapper">
            <textarea class="dream-input" id="dream-input" placeholder="Ask me anything about Dream AI..." rows="1"></textarea>
          </div>
          <button class="dream-send-btn" id="dream-send" title="Send message">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>

        <!-- Powered By -->
        <div class="dream-powered">
          Powered by <a href="https://dream-ai.com" target="_blank" rel="noopener">${escapeHtml(CONFIG.brandName)}</a>
        </div>
      </div>
    `;
  }

  function addMessage(role, text, options = {}) {
    const messagesEl = document.getElementById('dream-messages');
    const msg = { role, content: text, timestamp: getTimestamp() };
    state.messages.push(msg);
    state.messageCount++;

    const msgEl = document.createElement('div');
    msgEl.className = `dream-msg ${role}`;

    const avatarHTML = role === 'ai' ? `
      <div class="dream-msg-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>` : '';

    const quickRepliesHTML = options.quickReplies ? `
      <div class="dream-quick-replies">
        ${options.quickReplies.map(qr => `<button class="dream-quick-reply" data-text="${escapeHtml(qr)}">${escapeHtml(qr)}</button>`).join('')}
      </div>` : '';

    msgEl.innerHTML = `
      ${avatarHTML}
      <div>
        <div class="dream-msg-bubble">${formatMessage(text)}</div>
        ${quickRepliesHTML}
        <div class="dream-msg-time">${msg.timestamp}</div>
      </div>
    `;

    messagesEl.appendChild(msgEl);
    scrollToBottom();
    playSound();
  }

  function showTyping() {
    state.isTyping = true;
    const messagesEl = document.getElementById('dream-messages');

    let typingEl = document.getElementById('dream-typing-indicator');
    if (!typingEl) {
      typingEl = document.createElement('div');
      typingEl.id = 'dream-typing-indicator';
      typingEl.className = 'dream-typing';
      typingEl.innerHTML = `
        <div class="dream-msg-avatar">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <div class="dream-typing-dots">
          <div class="dream-typing-dot"></div>
          <div class="dream-typing-dot"></div>
          <div class="dream-typing-dot"></div>
        </div>
      `;
    }

    messagesEl.appendChild(typingEl);
    typingEl.classList.add('visible');
    scrollToBottom();
  }

  function hideTyping() {
    state.isTyping = false;
    const typingEl = document.getElementById('dream-typing-indicator');
    if (typingEl) {
      typingEl.classList.remove('visible');
    }
  }

  function scrollToBottom() {
    const messagesEl = document.getElementById('dream-messages');
    setTimeout(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, 50);
  }

  function togglePanel() {
    state.isOpen = !state.isOpen;
    const panel = document.getElementById('dream-panel');
    const bubble = document.getElementById('dream-bubble');
    const badge = document.getElementById('dream-badge');

    if (state.isOpen) {
      panel.classList.add('open');
      bubble.classList.remove('pulse');
      badge.classList.remove('visible');
      document.getElementById('dream-input').focus();

      // Send initial greeting if first open
      if (state.messages.length === 0) {
        setTimeout(() => {
          addMessage('ai', `Hi! 👋 I'm the Dream AI Assistant. I can help you learn about our AI employee platform, find the right plan, or book a free demo.\n\nWhat would you like to know?`, {
            quickReplies: ['What is Dream AI?', 'How much does it cost?', 'Book a demo']
          });
        }, 400);
      }
    } else {
      panel.classList.remove('open');
    }
  }

  function sendMessage() {
    const input = document.getElementById('dream-input');
    const text = input.value.trim();
    if (!text || state.isTyping) return;

    // Detect email
    if (isEmail(text)) {
      addMessage('user', text);
      input.value = '';
      input.style.height = 'auto';

      showTyping();
      setTimeout(async () => {
        hideTyping();
        const response = handleEmailInput(text);
        addMessage('ai', response);
        checkLeadCapture('');
      }, 800);
      return;
    }

    // Detect "yes" for calculator offer
    if (state.conversationPhase === 'asking_email' && state.emailCollected) {
      const lower = text.toLowerCase();
      if (lower.includes('yes') || lower.includes('sure') || lower.includes('yeah') || lower.includes('ok')) {
        addMessage('user', text);
        input.value = '';
        input.style.height = 'auto';
        state.conversationPhase = 'asked_calculator';
        showTyping();
        setTimeout(() => {
          hideTyping();
          addMessage('ai', `Great! 🎯 Here's the Revenue Calculator: [Calculate Your Revenue Loss →](${CONFIG.calculatorUrl})\n\nIt only takes 60 seconds. You'll be surprised how much missed calls are actually costing you!`);
        }, 600);
        return;
      }
    }

    // Check for demo request
    if (text.toLowerCase().includes('demo') || text.toLowerCase().includes('book') || text.toLowerCase().includes('schedule')) {
      state.requestedDemo = true;
    }

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    showTyping();

    // Simulate realistic typing delay
    const delay = Math.min(500 + text.length * 15, 2000);

    setTimeout(async () => {
      const response = await getAIResponse(text);
      hideTyping();
      addMessage('ai', response);
      checkLeadCapture(text);
    }, delay);
  }

  // ================================================================
  // EVENT BINDINGS
  // ================================================================
  function bindEvents() {
    // Bubble click
    document.getElementById('dream-bubble').addEventListener('click', togglePanel);

    // Minimize
    document.getElementById('dream-minimize').addEventListener('click', togglePanel);

    // Send button
    document.getElementById('dream-send').addEventListener('click', sendMessage);

    // Enter to send
    const input = document.getElementById('dream-input');
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Sound toggle
    document.getElementById('dream-sound-toggle').addEventListener('click', function() {
      state.soundEnabled = !state.soundEnabled;
      const icon = document.getElementById('dream-sound-icon');
      if (state.soundEnabled) {
        icon.classList.remove('dream-sound-off');
        icon.classList.add('dream-sound-on');
        icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
      } else {
        icon.classList.remove('dream-sound-on');
        icon.classList.add('dream-sound-off');
        icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
      }
    });

    // Quick reply buttons (delegated)
    document.getElementById('dream-messages').addEventListener('click', function(e) {
      const qrBtn = e.target.closest('.dream-quick-reply');
      if (qrBtn) {
        const text = qrBtn.getAttribute('data-text');
        if (text) {
          document.getElementById('dream-input').value = text;
          sendMessage();
        }
      }
    });

    // Show badge after 3 seconds if not open
    setTimeout(() => {
      if (!state.isOpen) {
        const badge = document.getElementById('dream-badge');
        badge.classList.add('visible');
      }
    }, 3000);
  }

  // ================================================================
  // INITIALIZATION
  // ================================================================
  function init() {
    // Check for OpenAI key warning
    if (!CONFIG.openaiApiKey) {
      console.warn('[Dream AI Chat] ⚠️ No OpenAI API key configured. Using pre-programmed responses only.\nSet window.DREAM_AI_CONFIG.openaiApiKey before loading this script.\nFor production, use a backend proxy to protect your API key.');
    }

    createDOM();
    bindEvents();
    console.log('[Dream AI Chat] ✅ Widget initialized');
  }

  // Wait for DOM
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
